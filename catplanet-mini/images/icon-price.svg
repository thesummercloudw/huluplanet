<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 手绘价格图标 - 铜板/硬币 + 小装饰 -->
  <!-- 硬币主体 - 松散椭圆 -->
  <ellipse cx="24" cy="26" rx="14" ry="13" fill="#B8E8F8" stroke="#2A2A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 内圈虚线 -->
  <ellipse cx="24" cy="26" rx="9" ry="8.5" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 3" opacity="0.4"/>
  <!-- 中间 ¥ 符号 - 手绘感 -->
  <path d="M20 22 L24 28 L28 22" fill="none" stroke="#2A2A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M21 25 L27 25" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 28 L24 32" fill="none" stroke="#2A2A2A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 光泽弧线 -->
  <path d="M16 20 C18 17, 22 16, 24 17" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- 小装饰星 -->
  <path d="M38 12 L39 10 L40 12 L39 14Z" fill="#8EBD3C" stroke="none" opacity="0.7"/>
  <!-- 小圆点 -->
  <circle cx="8" cy="16" r="1.5" fill="#38B8E8" opacity="0.5"/>
  <circle cx="40" cy="36" r="1.2" fill="#FFB8C6" opacity="0.6"/>
</svg>
