<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 手绘柱状图图标 -->
  <!-- 底部基线 -->
  <path d="M8 38 L40 38" fill="none" stroke="#2A2A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 柱子1 - 矮 -->
  <rect x="11" y="28" width="6" height="10" rx="2" fill="#B8E8F8" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 柱子2 - 高 -->
  <rect x="21" y="16" width="6" height="22" rx="2" fill="#38B8E8" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 柱子3 - 中 -->
  <rect x="31" y="22" width="6" height="16" rx="2" fill="#E8F7D6" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 趋势小线 -->
  <path d="M14 25 L24 13 L34 19" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- 装饰小星星 -->
  <path d="M40 10 L41 8 L42 10 L41 12Z" fill="#8EBD3C" stroke="none" opacity="0.7"/>
  <circle cx="8" cy="12" r="1.5" fill="#38B8E8" opacity="0.5"/>
</svg>
