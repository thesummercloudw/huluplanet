  <path d="M32 14 C34 12, 36 14, 38 16 C40 18, 38 20, 36 20" fill="none" stroke="#38B8E8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 毛球 -->
  <circle cx="36" cy="24" r="6" fill="#FFB8C6" stroke="#2A2A2A" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <!-- 毛球绒毛线条 -->
  <path d="M33 22 C34 20, 36 21, 37 22" fill="none" stroke="#2A2A2A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M34 26 C36 27, 38 25, 39 26" fill="none" stroke="#2A2A2A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- 运动线条 -->
  <path d="M40 28 L42 30" fill="none" stroke="#8EBD3C" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M42 24 L44 24" fill="none" stroke="#8EBD3C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- 装饰 -->
  <path d="M16 10 L17 8 L18 10 L17 12Z" fill="#38B8E8" stroke="none" opacity="0.6"/>
  <circle cx="8" cy="28" r="1.2" fill="#8EBD3C" opacity="0.5"/>
</svg>
