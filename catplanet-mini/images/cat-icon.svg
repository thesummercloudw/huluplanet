  <path d="M21 28 C22 26, 24 26, 25 28" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M27 27 C28 25, 30 25, 31 27" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 小鼻子 -->
  <path d="M25 30 L26 29 L27 30" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 尾巴 - 翘起的弯曲线 -->
  <path d="M56 40 C62 36, 66 30, 64 26 C62 22, 58 24, 60 28" fill="none" stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 加号 - 手绘 -->
  <path d="M58 52 L58 64" fill="none" stroke="#8EBD3C" stroke-width="3" stroke-linecap="round"/>
  <path d="M52 58 L64 58" fill="none" stroke="#8EBD3C" stroke-width="3" stroke-linecap="round"/>
  <!-- 小装饰 -->
  <path d="M46 16 L47 14 L48 16 L47 18Z" fill="#FFB8C6" stroke="none" opacity="0.7"/>
  <circle cx="66" cy="44" r="1.2" fill="#38B8E8" opacity="0.5"/>
