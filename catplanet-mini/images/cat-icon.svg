  <path d="M30 52 C22 50, 18 44, 20 38 C22 32, 30 28, 40 28 C50 28, 58 32, 60 38 C62 44, 58 50, 50 52 C44 54, 36 54, 30 52Z" fill="#B8E8F8" stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 猫头 - 偏左上 -->
  <path d="M22 36 C18 34, 16 28, 18 24 C20 20, 26 18, 30 20 C34 22, 35 28, 33 32 C31 36, 26 38, 22 36Z" fill="#B8E8F8" stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 左耳 -->
  <path d="M19 23 L16 14 L24 20" fill="none" stroke="#2A2A2A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 右耳 -->
  <path d="M28 20 L30 12 L34 20" fill="none" stroke="#2A2A2A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
