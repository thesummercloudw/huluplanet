<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="catBodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F5EBE0"/>
    </radialGradient>
  </defs>

  <!-- 猫剪影 - 居中显示 -->
  <g transform="translate(42, 42) scale(1.5)">
    <!-- 身体主体 -->
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="url(#catBodyGrad)"/>
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="none" stroke="#EDE5DA" stroke-width="0.8"/>

    <!-- 头部 -->
    <circle cx="-14" cy="-10" r="12" fill="#FFF8F0"/>
    <circle cx="-14" cy="-10" r="12" fill="none" stroke="#EDE5DA" stroke-width="0.6"/>

    <!-- 尖耳朵 - 左 -->
    <path d="M-22,-19 L-19,-28 L-14,-20" fill="#FFF8F0" stroke="#EDE5DA" stroke-width="0.6"/>
    <path d="M-20,-20 L-18.5,-26 L-15.5,-20.5" fill="#FFDDD2" opacity="0.5"/>

    <!-- 尖耳朵 - 右 -->
    <path d="M-8,-19 L-5,-27 L-2,-18" fill="#FFF8F0" stroke="#EDE5DA" stroke-width="0.6"/>
    <path d="M-7,-19.5 L-5.5,-25 L-3,-18.5" fill="#FFDDD2" opacity="0.5"/>

    <!-- 闭眼 -->
    <path d="M-18,-9 Q-16,-7 -14,-9" fill="none" stroke="#C4A98E" stroke-width="1" stroke-linecap="round"/>
    <path d="M-12,-9 Q-10,-7 -8,-9" fill="none" stroke="#C4A98E" stroke-width="1" stroke-linecap="round"/>

    <!-- 小鼻子 -->
    <ellipse cx="-13" cy="-6" rx="1.2" ry="1" fill="#E8B4A8"/>

    <!-- 蓬松尾巴 -->
    <path d="M18,-2 Q28,-8 30,2 Q32,12 24,16 Q18,19 14,14" 
          fill="#FFF8F0" stroke="#EDE5DA" stroke-width="0.8"/>
    <path d="M20,-4 Q26,-6 28,0 Q30,8 24,12 Q20,15 16,12" 
          fill="none" stroke="#F5EBE0" stroke-width="1.5" opacity="0.5"/>

    <!-- 前爪 -->
    <ellipse cx="-8" cy="10" rx="5" ry="3.5" fill="#FFF8F0" stroke="#EDE5DA" stroke-width="0.5"/>
    <circle cx="-6" cy="10.5" r="1" fill="#FFDDD2" opacity="0.6"/>
  </g>
</svg>
