  <!-- 书脊装饰线 -->
  <path d="M16 8 L16 42" fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- 内页横线 - 松散手绘 -->
  <path d="M20 17 L34 17.3" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M20 22 L33 22.5" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M20 27 L34 26.8" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M20 32 L32 32.3" fill="none" stroke="#2A2A2A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <!-- 爱心小贴纸 -->
  <path d="M28 13 C28 12, 29 11, 30 12 C31 11, 32 12, 32 13 C32 14.5, 30 16, 30 16 C30 16, 28 14.5, 28 13Z" fill="#FFB8C6" stroke="none" opacity="0.8"/>
  <!-- 小星星装饰 -->
  <path d="M7 14 L8 12 L9 14 L8 16Z" fill="#8EBD3C" stroke="none" opacity="0.6"/>
  <path d="M40 32 L41 30 L42 32 L41 34Z" fill="#38B8E8" stroke="none" opacity="0.5"/>
