<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 81 81" width="81" height="81">
  <!-- 手绘猫耳头像 - 选中态(天蓝) -->
  <!-- 头部 - 不规则手绘圆，天蓝填充 -->
  <path d="M28 42 C26 35, 30 28, 40 27 C50 28, 55 35, 53 42 C51 49, 44 52, 40 52 C36 52, 30 49, 28 42Z" fill="#B8E8F8" stroke="#38B8E8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 左耳 - 手绘三角 -->
  <path d="M29 30 L26 17 L36 26" fill="#E8F7D6" stroke="#38B8E8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 右耳 - 手绘三角 -->
  <path d="M52 30 L55 17 L45 26" fill="#E8F7D6" stroke="#38B8E8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 眼睛 - 小弧线(眯眯眼) -->
  <path d="M34 38 C35 36, 37 36, 38 38" fill="none" stroke="#38B8E8" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M43 38 C44 36, 46 36, 47 38" fill="none" stroke="#38B8E8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 鼻子 - 小三角，粉色点缀 -->
  <path d="M39 42 L40.5 40 L42 42Z" fill="#FFB8C6" stroke="#38B8E8" stroke-width="1" stroke-linecap="round"/>
  <!-- 身体提示弧线 -->
  <path d="M32 54 C36 58, 44 58, 49 54" fill="none" stroke="#38B8E8" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- 小星星装饰 -->
  <path d="M58 22 L59 20 L60 22 L59 24Z" fill="#8EBD3C" stroke="none"/>
</svg>
